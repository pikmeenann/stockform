function detectCurrentAction() {
  const searchParams =
    new URLSearchParams(window.location.search);

  selectedRestockRequestId =
  searchParams.get('requestId') || '';

  let mode =
    searchParams.get('mode') ||
    searchParams.get('action') ||
    '';

  if (!mode && window.location.hash) {
    mode =
      window.location.hash.replace('#', '');
  }

  if (!mode) {
    try {
      const context =
        liff.getContext();

      const state =
        context &&
        context.liff &&
        context.liff.state
          ? decodeURIComponent(context.liff.state)
          : '';

      if (state) {
        const cleanState =
          state.replace(/^\?/, '');

        const stateParams =
          new URLSearchParams(cleanState);

        mode =
          stateParams.get('mode') ||
          stateParams.get('action') ||
          '';
      }

    } catch (err) {}
  }

  currentAction =
    mode || 'stock';

  console.log('currentAction =', currentAction);
}
    
    
async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    detectCurrentAction();

    if (currentAction === 'help') {
      renderHelpPage();
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    await loadAppData();
  } catch (err) {
    showError(err);
  }
}

    async function apiGet(params) {
      const url = API_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      return await res.json();
    }

    async function loadAppData() {

      branchId: getBranchId ? getBranchId() : ''
      });

      if (!data.ok) {
        document.body.innerHTML = '<div class="card">' + data.message + '</div>';
        return;
      }

     appData = data;

if (currentAction === 'stockview') {

if (currentAction === 'stock') {

if (currentAction === 'help') {

      setStatus(

function renderBranches() {
  const select = document.getElementById('branch');
  if (!select) return;

  select.innerHTML = '';

  const role = String(appData.user.role || '').toLowerCase();
  const userBranchId = String(appData.user.branch_id || '').trim();

  let branches = appData.branches || [];

  if (role === 'staff') {
    branches = branches.filter(function(b) {
      return String(b.branch_id).trim() === userBranchId;
    });
  }

  branches.forEach(function(b) {
    const option = document.createElement('option');
    option.value = b.branch_id;
    option.textContent = b.branch_name;
    select.appendChild(option);
  });

if (role === 'staff') {
  select.style.display = 'none';

  const display = document.getElementById('stockBranchDisplay');
  if (display) {
    display.style.display = 'block';
    display.textContent = 'สาขา: ' + userBranchId;
  }
} else {
  select.style.display = 'block';
}

  loadStockMap();
}

    async function loadStockMap() {
      const branchId = getBranchId();
      if (!branchId) return;

      try {
        const data = await apiGet({
          action: 'stockMap',
          branchId: branchId
        });

      if (data.ok) {
        stockMap = data.stockMap || {};

        updateStockDisplays();

        renderWaterRows();
        renderFruitRows();
        renderDipRows();
      }
      } catch (err) {
        showError(err);
      }
    }

    function renderTables() {
      renderWaterRows();
      renderFruitRows();
      renderDipRows();
    }

function getStockQty(productId) {
  const item = stockMap[productId];

  if (item === undefined || item === null) {
    return 0;
  }

  if (typeof item === 'number') {
    return item;
  }

  if (typeof item === 'string') {
    return Number(item || 0);
  }

  return Number(
    item.stock ??
    item.qty ??
    item.balance ??
    item.current_qty ??
    item.current_stock ??
    item.stock_qty ??
    item.qty_balance ??
    0
  );
}

    function createRow(product, fields) {
      const tr = document.createElement('tr');
      tr.dataset.productId = product.product_id;
      tr.dataset.category = product.category;

      const nameTd = document.createElement('td');
      nameTd.className = 'product';
      nameTd.innerHTML =
        product.product_name +
        '<span class="price">' +
        product.product_id +
        ' / ' +
        Number(product.base_price || 0).toLocaleString() +
        ' บาท</span>';
      tr.appendChild(nameTd);

      const stockTd = document.createElement('td');
      stockTd.id = 'stock_' + product.product_id;
      stockTd.textContent = '-';
      tr.appendChild(stockTd);

      fields.forEach(([field]) => {
        const td = document.createElement('td');

        const input = document.createElement('input');
        input.className = 'qty';
        input.type = 'number';
        input.min = '0';
        input.inputMode = 'numeric';
        input.dataset.productId = product.product_id;
        input.dataset.category = product.category;
        input.dataset.field = field;
        input.placeholder = '0';

        td.appendChild(input);
        tr.appendChild(td);
      });

      return tr;
    }

    function updateStockDisplays() {
        Object.keys(stockMap).forEach(productId => {
          const el = document.getElementById('stock_' + productId);
          if (el) {
              el.textContent =
              getStockQty(productId).toLocaleString();
          }
        });
      }

    function getProductsByCategory(category) {
      return (appData.products || []).filter(p => p.category === category);
    }

    function getBranchId() {
      return document.getElementById('branch').value;
    }

    function collectRows() {
  const map = {};

  document.querySelectorAll('input.qty').forEach(input => {
    const value = Number(input.value || 0);
    if (value <= 0) return;

    const productId =
      input.dataset.productId ||
      input.dataset.product;

    const category =
      input.dataset.category || '';

    const field =
      input.dataset.field;

    if (!productId || !field) return;

    if (!map[productId]) {
      map[productId] = {
        productId,
        category
      };
    }

    map[productId][field] = value;
  });

  return Object.values(map);
}

    function formatShortDate(dateText) {
  const text =
    String(dateText || '').trim();

  if (!text) {
    return '-';
  }

  const parts =
    text.split('-');

  if (parts.length !== 3) {
    return text;
  }

  return parts[2] + '/' + parts[1];
}

    function renderDailyTrendBlock(rows) {
  if (!rows || !rows.length) {
    return `<div class="status">ไม่มีข้อมูลยอดขายย้อนหลัง</div>`;
  }

  const maxAmount =
    Math.max.apply(
      null,
      rows.map(row => Number(row.amount || 0))
    ) || 1;

  let html = `
    <div class="metric-card">
  `;

  rows.forEach(function(row) {
    const amount =
      Number(row.amount || 0);

    const percent =
      Math.max(
        2,
        Math.round((amount / maxAmount) * 100)
      );

    const label =
      String(row.date || '').slice(5);

    html += `
      <div style="margin-bottom:8px;">
        <div style="
          display:flex;
          justify-content:space-between;

          <span>${label}</span>
          <b>${money(amount)}</b>
        </div>

        <div style="
          background:#e5e7eb;
          border-radius:999px;
          overflow:hidden;
          height:8px;
        ">
          <div style="
            width:${percent}%;
            height:8px;
            background:#06c755;
            border-radius:999px;
          "></div>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

    function formatDiff(num) {
  const value = Number(num || 0);

  if (value > 0) {
    return '(+' + value.toLocaleString() + ')';
  }

  if (value < 0) {
    return '(-' + Math.abs(value).toLocaleString() + ')';
  }

  return '(+0)';
}

    function money(value) {

    return `<span class="diff-minus">-${money(Math.abs(num))}</span>`;

function formatPoDiff(value) {
  const num = Number(value || 0);

  if (num > 0) {
    return '+' + money(num) + ' บาท';
  }

  if (num < 0) {
    return '-' + money(Math.abs(num)) + ' บาท';
  }

  return '0 บาท';
}

async function submitConfirmed() {

  if (isSubmitting) {
    return;
  }

  if (!pendingPayload) {
    alert('ไม่มีข้อมูลสำหรับบันทึก');
    return;
  }

  const btn =
    document.getElementById('confirmBtn');

  try {

    isSubmitting = true;

    if (btn) {
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
    }

    const data = await apiGet({
      action: 'submitBulkV2',
      payload: JSON.stringify(pendingPayload)
    });

    if (!data.ok) {
      alert(data.message || 'บันทึกไม่สำเร็จ');
      return;
    }

    closePreview();

    alert(
      'บันทึกเรียบร้อย\n\n' +
      'ยอดขายรวม: ' +
      Number(data.totalAmount || 0).toLocaleString() +
      ' บาท'
    );

    clearForm();

    await loadStockMap();

  } catch (err) {

    showError(err);

  } finally {

    isSubmitting = false;

    if (btn) {
      btn.disabled = false;
      btn.textContent = 'ยืนยันบันทึก';
    }
  }

async function submitRestockFromLiff() {
  const branchId =
    document.getElementById('branchId').value;

  const staffName =
    document.getElementById('staffName').value.trim();

  const requestedDeliveryDate =
    document.getElementById('requestedDeliveryDate').value;

  const submitBtn =
    document.getElementById('submitBtn');

  if (!branchId) {
    alert('กรุณาเลือกสาขา');
    return;
  }

  if (!staffName) {
    alert('กรุณาเลือกชื่อผู้สั่ง');
    return;
  }

  if (!requestedDeliveryDate) {
    alert('กรุณาเลือกวันที่ต้องการรับสินค้า');
    return;
  }

  const items = [];

  restockItems.forEach(function(item, index) {
    const qty =
      Number(document.getElementById('qty_' + index).value || 0);

    if (qty > 0) {
      items.push({
        product_id: item.product_id,
        product_name: item.product_name || item.product_id,
        current_stock: item.current_stock,
        min_qty: item.min_qty || '',
        requested_qty: qty,
        remark: document.getElementById('remark_' + index).value.trim()
      });
    }
  });

  if (!items.length) {
    alert('กรุณากรอกจำนวนเติมอย่างน้อย 1 รายการ');
    return;
  }

  const confirmText =
    items.map(function(item) {
      return item.product_id + ' เติม ' + item.requested_qty;
    }).join('\\n');

  if (!confirm('ยืนยันส่งคำขอเติม?\\n\\n' + confirmText)) {
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'กำลังส่ง...';

try {

  const data = await apiGet({
  action: 'submitRestock',
  payload: JSON.stringify({
    lineUserId: lineUserId,
    branch_id: branchId,
    staff_name: staffName,
    requested_delivery_date: requestedDeliveryDate,
    items: items
  })
});

  if (!data.ok) {
    alert(data.message || 'ส่งคำขอเติมไม่สำเร็จ');
    return;
  }

  alert('ส่งคำขอเติมสำเร็จ');

restockItems = [];
document.getElementById('tableArea').innerHTML =
  'ส่งคำขอเติมสำเร็จแล้ว';

} catch (err) {

  alert('ส่งไม่สำเร็จ: ' + (err.message || err));

} finally {

  submitBtn.disabled = false;
  submitBtn.textContent = 'ส่งคำขอเติม';

}
}

      });

function renderRestockAdminSummary() {
  const box =
    document.getElementById('restockAdminSummary');

  if (!box) return;

  const groups =
    pendingRestockGroups || [];

  if (!groups.length) {
    box.innerHTML = `
      <div class="card">
        <h2>สรุปออเดอร์</h2>
        <div class="status">ไม่มีออเดอร์รอส่ง</div>
      </div>
    `;
    return;
  }

  const branchMap = {};
  const productMap = {};

  let totalOrders = groups.length;
  let totalQty = 0;

  groups.forEach(function(group) {
    const branchId =
      String(group.branch_id || '-').trim();

    if (!branchMap[branchId]) {
      branchMap[branchId] = {
        branch_id: branchId,
        order_count: 0,
        qty: 0,
      };
    }

    branchMap[branchId].order_count++;

    (group.items || []).forEach(function(item) {
      const productCode =
        String(item.product_code || item.product_id || '').trim();

      const productName =
        item.product_name || productCode;

      const qty =
        Number(item.confirmed_qty || item.requested_qty || 0);

      totalQty += qty;
      branchMap[branchId].qty += qty;

      if (!productMap[productCode]) {
        productMap[productCode] = {
          product_code: productCode,
          product_name: productName,
          qty: 0,
        };
      }

      productMap[productCode].qty += qty;
    });
  });

  const branchRows =
    Object.keys(branchMap)
      .map(function(branchId) {
        return branchMap[branchId];
      })
      .sort(function(a, b) {
        return String(a.branch_id).localeCompare(String(b.branch_id));
      });

  const productRows =
    Object.keys(productMap)
      .map(function(productCode) {
        return productMap[productCode];

        return Number(b.qty || 0) - Number(a.qty || 0);

        </div>

        <div class="metric-card">
          <div class="metric-title">จำนวนรวม</div>
          <div class="metric-value">${totalQty.toLocaleString()}</div>
        </div>
      </div>

      <h2 style="margin-top:18px;">สรุปตามสาขา</h2>
  `;

  html += `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>สาขา</th>
            <th>ใบเติม</th>
            <th>จำนวนรวม</th>
          </tr>
        </thead>
        <tbody>
  `;

  branchRows.forEach(function(row) {
    html += `
      <tr>
        <td class="product">${row.branch_id}</td>
        <td>${Number(row.order_count || 0).toLocaleString()}</td>
        <td><b>${Number(row.qty || 0).toLocaleString()}</b></td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>

    <h2 style="margin-top:18px;">สรุปตามสินค้า</h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>สินค้า</th>
            <th>จำนวนรวม</th>
          </tr>
        </thead>
        <tbody>
  `;

  productRows.forEach(function(row) {
    html += `
      <tr>
        <td class="product">
          ${row.product_name}
          <div class="small">${row.product_code}</div>
        </td>
        <td><b>${Number(row.qty || 0).toLocaleString()}</b></td>

async function confirmRestockAdminGroup(groupIndex) {
  const group =
    pendingRestockGroups[groupIndex];

  const btn =
    document.getElementById('admin_btn_' + groupIndex);

  const deliveryDate =
    document.getElementById('admin_delivery_date_' + groupIndex).value;

  if (!group || !group.request_id) {
    alert('ไม่พบเลขที่ใบสั่ง');
    return;
  }

  if (!deliveryDate) {
    alert('กรุณาระบุวันส่งจริง');
    return;
  }

  const items =
    (group.items || []).map(function(item, itemIndex) {
      const el =
        document.getElementById(
          'admin_confirmed_qty_' + groupIndex + '_' + itemIndex
        );

      const confirmedQty =
        el && el.value !== ''
          ? Number(el.value || 0)
          : Number(item.requested_qty || 0);

      return {
        row_number: item.row_number,
        product_code: item.product_code,
        product_name: item.product_name,
        confirmed_qty: confirmedQty,
        remark: item.remark || ''
      };
    });

  if (!items.some(item => Number(item.confirmed_qty || 0) > 0)) {
    alert('กรุณาระบุจำนวนส่งจริงอย่างน้อย 1 รายการ');
    return;
  }

  if (
    !confirm(
      'ยืนยันส่งจริงและเติมเข้าสต๊อกทันที?\n\nเลขที่ ' +
      group.request_id
    )
  ) {
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังยืนยัน...';

  try {
    const data =
      await apiGet({
        action: 'confirmRestockGroup',
        payload: JSON.stringify({
          request_id: group.request_id,
          delivery_date: deliveryDate,
          confirmed_by: appData.user.name || 'โรงงาน',
          confirmed_by_uid: lineUserId,
          lineUserId: lineUserId,
          items: items
        })
      });

    if (!data.ok) {
      alert(data.message || 'ยืนยันไม่สำเร็จ');
      btn.disabled = false;
      btn.textContent = 'ยืนยันส่งจริงและเติมเข้าสต๊อก';
      return;
    }

    alert(
      'ยืนยันและเติมเข้าสต๊อกเรียบร้อย\n\n' +
      'เลขที่: ' + data.request_id + '\n' +
      'จำนวนรายการ: ' + (data.received_count || 0) + '\n' +
      'จำนวนรวม: ' + (data.received_qty || 0)
    );

    await loadRestockAdminGroups();

  } catch (err) {
    alert('ยืนยันไม่สำเร็จ: ' + (err.message || err));
    btn.disabled = false;
    btn.textContent = 'ยืนยันส่งจริงและเติมเข้าสต๊อก';
  }
}

async function voidSelectedLogs() {
  const reason =
    document.getElementById('voidReason').value.trim();

  const voidBtn =
    document.getElementById('voidSubmitBtn');

  if (!foundVoidLogs.length) {
    alert('ยังไม่มีรายการให้ void');
    return;
  }

  if (!reason) {
    alert('กรุณาระบุเหตุผล');
    return;
  }

  const activeTxIds =
    Array.from(
      document.querySelectorAll('.void-check:checked')
    ).map(input => input.dataset.txId);

  if (!activeTxIds.length) {
    alert('กรุณาเลือกรายการที่ต้องการ Void');
    return;
  }

  if (
    !confirm(
      'ยืนยัน Void ' +
      activeTxIds.length +
      ' รายการ?\n\nระบบจะปรับ STOCK_BALANCE กลับอัตโนมัติ'
    )
  ) {
    return;
  }

  voidBtn.disabled = true;
  voidBtn.textContent = 'กำลัง Void...';

  try {
    const data =
      await apiGet({
        action: 'voidStockLogs',
        payload: JSON.stringify({
          tx_ids: activeTxIds,
          reason: reason
        })
      });

    if (!data.ok) {
      alert(data.message || 'Void ไม่สำเร็จ');
      voidBtn.disabled = false;
      voidBtn.textContent = 'ยืนยัน Void รายการที่ค้นพบ';
      return;
    }

    alert(
      'Void สำเร็จ\n\n' +
      'จำนวนรายการ: ' + data.void_count + '\n' +
      'ผลกระทบ stock:\n' +
      JSON.stringify(data.affected, null, 2)
    );

    voidBtn.textContent =
      'ยืนยัน Void รายการที่ค้นพบ';

    if (document.getElementById('voidSearchBranch').value) {

  } catch (err) {
    alert('Void ไม่สำเร็จ: ' + (err.message || err));
    voidBtn.disabled = false;
    voidBtn.textContent = 'ยืนยัน Void รายการที่ค้นพบ';
  }
}

async function cancelRestockAdminGroup(groupIndex) {
  const group =
    pendingRestockGroups[groupIndex];

  const btn =
    document.getElementById('admin_cancel_btn_' + groupIndex);

  const cancelledBy =
    document.getElementById('confirmedBy').value.trim() ||
    (appData.user && appData.user.name) ||
    'admin';

  if (!group || !group.request_id) {
    alert('ไม่พบเลขที่ใบสั่ง');
    return;
  }

  const reason =
    prompt(
      'ระบุเหตุผลการยกเลิกใบสั่ง\n\nเลขที่ ' + group.request_id,
      'พนักงานสั่งผิด'
    );

  if (reason === null) {
    return;
  }

  if (!confirm('ยืนยันยกเลิกใบสั่งนี้?\n\nเลขที่ ' + group.request_id)) {
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังยกเลิก...';

  try {
    const data =
      await apiGet({
        action: 'cancelRestockGroup',
        payload: JSON.stringify({
          request_id: group.request_id,
          cancelled_by: cancelledBy,
          reason: reason
        })
      });

    if (!data.ok) {
      alert(data.message || 'ยกเลิกไม่สำเร็จ');
      btn.disabled = false;
      btn.textContent = 'ยกเลิกใบสั่ง';
      return;
    }

    alert(
      'ยกเลิกใบสั่งเรียบร้อย\n\n' +
      'เลขที่: ' + data.request_id + '\n' +
      'จำนวนรายการ: ' + data.cancel_count
    );

    await reloadRestockAdminPage();

  } catch (err) {
    alert('ยกเลิกไม่สำเร็จ: ' + (err.message || err));
    btn.disabled = false;
    btn.textContent = 'ยกเลิกใบสั่ง';
  }
}

function formatFactoryStatus_(status) {
  const text =
    String(status || '').trim().toUpperCase();

  if (text === 'PENDING') return 'รอ Auto / รอแก้จำนวนจริง';
  if (text === 'RECEIVED_MANUAL') return 'ยืนยันส่งจริงแล้ว';
  if (text === 'RECEIVED_AUTO') return 'ระบบเติมให้อัตโนมัติ';
  if (text === 'RECEIVED') return 'รับสินค้าแล้ว';
  if (text === 'APPROVED') return 'อนุมัติแล้ว';
  if (text === 'CANCELLED') return 'ยกเลิกแล้ว';

  return text || '-';
}

    needMap[String(row.material_id || '').trim().toUpperCase()] = row;

      getFactoryMaterialCategoryStyle_(row.category);

      Number(row.current_qty || 0);

      need.after_qty !== undefined

      row.base_unit || pack.base_unit || '';

      pack.pack_name || baseUnit || 'หน่วย';

        <div class="mobile-sale-head">
          <div>
            <span style="
              display:inline-block;
              padding:4px 8px;
              border-radius:999px;
              background:#ffffff;
              border:1px solid ${cat.border};
              color:${cat.color};
              font-size:12px;

          grid-template-columns:repeat(3, 1fr);

        ">
          <div>
            <div class="small">สต๊อก</div>

          </div>

            <div class="small">ค้างส่ง</div>

function escapeHtml_(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function filterFactoryPoSupplier_(supplier) {
  document.querySelectorAll('.factory-po-row')
    .forEach(function(row) {
      if (supplier === 'ALL') {
        row.style.display = '';
        return;
      }

      row.style.display =
        row.dataset.supplier === supplier
          ? ''
          : 'none';
    });
}

function updateFactoryPoAfterQty_(input) {
  const tr =
    input.closest('tr');

  if (!tr) return;

  const index =
    tr.dataset.index;

  const afterEl =
    document.getElementById('factory_po_after_' + index);

  if (!afterEl) return;

  const afterQty =
    Number(input.dataset.afterQty || 0);

  const baseQty =
    Number(input.dataset.baseQty || 0);

  const orderQty =
    Number(input.value || 0);

  const result =
    afterQty + (orderQty * baseQty);

  afterEl.textContent =
    result.toLocaleString();
}



async function submitFactoryPo_() {
  const orderDate =
    document.getElementById('factoryPoOrderDate').value;

  const note =
    document.getElementById('factoryPoNote').value.trim();

  if (!orderDate) {
    alert('กรุณาระบุวันที่สั่ง');
    return;
  }

  const inputs =
    Array.from(document.querySelectorAll('.factory-po-qty'));

  const items =
    inputs
      .map(function(input) {
        const qty =
          Number(input.value || 0);

        if (qty <= 0) return null;

        return {
          supplier_name: input.dataset.supplier,
          material_id: input.dataset.materialId,
          material_name: input.dataset.materialName,
          pack_id: input.dataset.packId,
          pack_name: input.dataset.packName,
          ordered_pack_qty: qty,
          base_qty: Number(input.dataset.baseQty || 0),
          base_unit: input.dataset.baseUnit || ''
        };
      })
      .filter(Boolean);

  if (!items.length) {
    alert('กรุณากรอกจำนวนสั่งอย่างน้อย 1 รายการ');
    return;
  }

  const supplierMap = {};

  items.forEach(function(item) {
    const supplier =
      item.supplier_name || 'อื่นๆ';

    if (!supplierMap[supplier]) {
      supplierMap[supplier] = [];
    }

    supplierMap[supplier].push(item);
  });

  let confirmText = '';

  Object.keys(supplierMap).forEach(function(supplier) {
    confirmText += '\n' + supplier + '\n';

    supplierMap[supplier].forEach(function(item) {
      confirmText +=
        '- ' +
        item.material_name +
        ' / ' +
        item.pack_name +
        ' x ' +
        item.ordered_pack_qty +
        '\n';
    });
  });

  if (!confirm('ยืนยันสร้างใบสั่งวัตถุดิบ?\n' + confirmText)) {
    return;
  }

  try {
    const createdPOs = [];

    for (const supplier of Object.keys(supplierMap)) {
      const data =
        await apiGet({
          action: 'createFactoryPO',
          payload: JSON.stringify({
            lineUserId: lineUserId,
            order_date: orderDate,
            supplier_name: supplier,
            expected_receive_date: '',
            note: note,
            items: supplierMap[supplier].map(function(item) {
              return {
                material_id: item.material_id,
                pack_id: item.pack_id,
                ordered_pack_qty: item.ordered_pack_qty
              };
            })
          })
        });

      if (!data.ok) {
        alert(
          'สร้าง PO ไม่สำเร็จ\n\nSupplier: ' +
          supplier +
          '\n' +
          (data.message || '')
        );
        return;
      }

      createdPOs.push(data.po_id);
    }

    alert(
      'สร้างใบสั่งวัตถุดิบเรียบร้อย\n\n' +
      createdPOs.join('\n')
    );

    await loadFactoryStockData();

  } catch (err) {
    alert('สร้าง PO ไม่สำเร็จ: ' + (err.message || err));
  }
}


function renderFactoryReceivePO_() {
  const openPOs =
    (factoryStockData && factoryStockData.open_pos) || [];

  let receiveItems = [];

  openPOs.forEach(function(po) {
    (po.items || []).forEach(function(item) {
      receiveItems.push({
        po_id: po.po_id,
        supplier_name: po.supplier_name || '-',
        order_date: po.order_date,
        item_id: item.item_id,
        material_id: item.material_id,
        material_name: item.material_name,
        pack_name: item.pack_name,
        ordered_pack_qty: Number(item.ordered_pack_qty || 0),
        received_pack_qty: Number(item.received_pack_qty || 0),
        remain_pack_qty: Number(item.remain_pack_qty || 0)
      });
    });
  });

  receiveItems = receiveItems.filter(function(item) {
    return Number(item.remain_pack_qty || 0) > 0;
  });

  receiveItems.sort(function(a, b) {
    return getFactoryMaterialSortOrder_(a.material_id) -
      getFactoryMaterialSortOrder_(b.material_id);
  });

  let html = `
    <div class="card">
      <h2>รายการสั่งซื้อคงค้าง</h2>
  `;

  if (!receiveItems.length) {
    html += `<div class="status">ไม่มี PO ค้างรับ</div>`;
  } else {
    receiveItems.forEach(function(item, index) {
      html += `
        <div class="mobile-sale-card" style="margin-bottom:10px;">
          <div class="mobile-product-name">
            ${item.material_name || item.material_id}
          </div>

          <span class="mobile-product-code">
            ${item.material_id || ''} • ${item.supplier_name}
          </span>

          <div class="small">
            วันที่สั่ง: ${formatFactoryDate_(item.order_date)}
          </div>

          <div class="small">
            PO: ${item.po_id}
          </div>

          <div style="
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:8px;
            margin-top:10px;
            font-size:13px;
          ">
            <div>
              <div class="small">สั่ง</div>
              <b>${item.ordered_pack_qty.toLocaleString()}</b>
            </div>

            <div>
              <div class="small">รับแล้ว</div>
              <b>${item.received_pack_qty.toLocaleString()}</b>
            </div>

            <div>
              <div class="small">ค้างรับ</div>
              <b>${item.remain_pack_qty.toLocaleString()}</b>
            </div>
          </div>

          <button
            onclick="receiveFactoryPoItem_('${item.po_id}', '${item.item_id}', ${item.remain_pack_qty})"
            style="margin-top:10px;">
            รับเข้าสต๊อก
          </button>
        </div>
      `;
    });
  }

  html += `</div>`;

  document.getElementById('factoryReceiveBox').innerHTML = html;
}


async function receiveFactoryPoItem_(poId, itemId, remainQty) {
  const qtyText =
    prompt(
      'ระบุจำนวนรับเข้า',
      String(remainQty || '')
    );

  if (qtyText === null) return;

  const qty =
    Number(qtyText || 0);

  if (qty <= 0) {
    alert('กรุณาระบุจำนวนมากกว่า 0');
    return;
  }

  if (qty > Number(remainQty || 0)) {
    alert('จำนวนรับเข้ามากกว่าจำนวนค้างรับ');
    return;
  }

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');

  const receiveDate =
    `${yyyy}-${mm}-${dd}`;

  if (!confirm('ยืนยันรับเข้าสต๊อกจำนวน ' + qty + ' ?')) {
    return;
  }

  try {
    const data =
      await apiGet({
        action: 'receiveFactoryPO',
        payload: JSON.stringify({
          lineUserId: lineUserId,
          po_id: poId,
          receive_date: receiveDate,
          items: [
            {
              item_id: itemId,
              receive_pack_qty: qty
            }
          ]
        })
      });

    if (!data.ok) {
      alert(data.message || 'รับเข้าไม่สำเร็จ');
      return;
    }

    alert('รับเข้าสต๊อกเรียบร้อย');

    await loadFactoryStockData();

  } catch (err) {
    alert('รับเข้าไม่สำเร็จ: ' + (err.message || err));
  }
}
    
    

function formatFactoryDate_(value) {
  if (!value) return '-';

  const text =
    String(value || '').trim();

  if (text.includes('GMT')) {
    const d = new Date(value);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  return text;
}


async function submitFactoryReceivePO_(poIndex) {
  const po =
    (factoryStockData.open_pos || [])[poIndex];

  if (!po) {
    alert('ไม่พบ PO');
    return;
  }

  const receiveDate =
    document.getElementById('factoryReceiveDate').value;

  if (!receiveDate) {
    alert('กรุณาระบุวันที่รับจริง');
    return;
  }

  const items = [];

  (po.items || []).forEach(function(item, itemIndex) {
    const el =
      document.getElementById(
        'factory_receive_' + poIndex + '_' + itemIndex
      );

    const qty =
      Number(el && el.value ? el.value : 0);

    if (qty > 0) {
      items.push({
        item_id: item.item_id,
        receive_pack_qty: qty
      });
    }
  });

  if (!items.length) {
    alert('กรุณากรอกจำนวนรับเข้าอย่างน้อย 1 รายการ');
    return;
  }

  if (!confirm('ยืนยันรับเข้าวัตถุดิบ PO ' + po.po_id + '?')) {
    return;
  }

  try {
    const data =
      await apiGet({
        action: 'receiveFactoryPO',
        payload: JSON.stringify({
          lineUserId: lineUserId,
          po_id: po.po_id,
          receive_date: receiveDate,
          items: items
        })
      });

    if (!data.ok) {
      alert(data.message || 'รับเข้าไม่สำเร็จ');
      return;
    }

    alert(
      'รับเข้าวัตถุดิบเรียบร้อย\n\n' +
      'PO: ' + data.po_id
    );

    await loadFactoryStockData();

  } catch (err) {
    alert('รับเข้าไม่สำเร็จ: ' + (err.message || err));
  }
}

    
    main();
  </script>
