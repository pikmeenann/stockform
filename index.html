<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Form</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 11px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }

    input[type="number"] {
      text-align: center;
    }

    input[readonly] {
      background: #f3f4f6;
    }

    button {
      border: none;
      background: #06c755;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #6b7280;
    }

    button.danger {
      background: #dc2626;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      padding: 10px;
      border-radius: 10px;
      background: #eef2ff;
      font-size: 14px;
      white-space: pre-line;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      background: white;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #f9fafb;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td.product {
      text-align: left;
      min-width: 150px;
      font-weight: bold;
    }

    .price {
      display: block;
      color: #6b7280;
      font-weight: normal;
      font-size: 12px;
      margin-top: 2px;
    }

    .qty {
      width: 64px;
      padding: 8px;
      font-size: 14px;
    }

    .summary {
      white-space: pre-line;
      line-height: 1.5;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      background: white;
      border-radius: 18px;
      padding: 16px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .loading {
      text-align: center;
      padding: 30px 12px;
      color: #6b7280;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
    .dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.metric-card {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 14px;
}

.metric-title {
  color: #6b7280;
  font-size: 13px;
}

.metric-value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 4px;
}

.diff-plus {
  color: #16a34a;
  font-weight: bold;
}

.diff-minus {
  color: #dc2626;
  font-weight: bold;
}

.diff-zero {
  color: #6b7280;
  font-weight: bold;
}

.progress-wrap {
  background: #e5e7eb;
  border-radius: 999px;
  height: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar {
  background: #06c755;
  height: 10px;
  border-radius: 999px;
}

.branch-card {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 12px;
  margin-top: 10px;
}
    .table-wrap {
  max-height: 70vh;
  overflow: auto;
  position: relative;
}

th {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #f9fafb;
}

th:first-child,
td:first-child {
  position: sticky;
  left: 0;
  z-index: 4;
  background: #ffffff;
}

th:first-child {
  z-index: 8;
  background: #f9fafb;
}

td.product {
  left: 0;
  background: #ffffff;
}
  </style>
</head>

<body>
  <div class="card">
    <h1>บันทึกสต๊อก / ยอดขาย</h1>
    <div id="status" class="status">กำลังโหลดข้อมูล...</div>

    <label>ชื่อผู้บันทึก</label>
    <input id="recorderName" type="text" readonly />

    <label>สาขา</label>
    <select id="branch" onchange="loadStockMap()"></select>

    <label>วันที่ทำรายการ</label>
    <input type="date" id="entryDate">

    <div class="small">
      ระบบใช้ LINE UID ตรวจสิทธิ์ พนักงานจะเลือกได้เฉพาะสาขาตัวเอง
    </div>
  </div>

  <div class="card">
    <h2>น้ำขวด</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>สินค้า</th>
            <th>คงเหลือ</th>
            <th>เติม</th>
            <th>ขาย</th>
            <th>แถม</th>
            <th>เสีย</th>
            <th>ชิม</th>
          </tr>
        </thead>
        <tbody id="waterRows"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>ผลไม้พร้อมทาน</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>สินค้า</th>
            <th>คงเหลือ</th>
            <th>เติม</th>
            <th>ขาย 99</th>
            <th>ขาย 79</th>
            <th>แพ็คคู่ 129</th>
            <th>เสีย</th>
          </tr>
        </thead>
        <tbody id="fruitRows"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>ผงจิ้ม</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
              <th>สินค้า</th>
              <th>คงเหลือ</th>
              <th>เติม</th>
              <th>แถม</th>
          </tr>
        </thead>
        <tbody id="dipRows"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <label>หมายเหตุรวม</label>
    <textarea id="note" rows="2" placeholder="ใส่หมายเหตุถ้ามี"></textarea>

    <button id="previewBtn" onclick="openPreview()">ตรวจสอบก่อนบันทึก</button>
    <button class="secondary" onclick="clearForm()">ล้างข้อมูล</button>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h2>ตรวจสอบก่อนบันทึก</h2>
      <div id="summaryText" class="summary"></div>
      <div class="modal-actions">
        <button class="secondary" onclick="closePreview()">แก้ไข</button>
        <button id="confirmBtn" onclick="submitConfirmed()">ยืนยันบันทึก</button>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010108973-B8s92NyH';
    const API_URL = 'https://script.google.com/macros/s/AKfycbyXWwBdfmQ0iKzF_lrPZlTF6vHckhcWqCb3TQjwTx6vIyzXv-WSqnqxiDYDpUvOALZ4rg/exec';

    let lineUserId = '';
    let appData = null;
    let stockMap = {};
    let pendingPayload = null;
    let currentAction = 'stock';
    let isSubmitting = false;

function detectCurrentAction() {
  const searchParams = new URLSearchParams(window.location.search);

  let mode =
    searchParams.get('mode') ||
    searchParams.get('action') ||
    '';

  if (!mode && window.location.hash) {
    mode = window.location.hash.replace('#', '');
  }

  try {
    const context = liff.getContext();
    const state = context && context.liff && context.liff.state
      ? decodeURIComponent(context.liff.state)
      : '';

    if (state) {
      const cleanState = state.replace(/^\?/, '');
      const stateParams = new URLSearchParams(cleanState);

      mode =
        stateParams.get('mode') ||
        stateParams.get('action') ||
        mode;
    }
  } catch (err) {}

  currentAction = mode || 'stock';
}
    
    
async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    detectCurrentAction();

    if (currentAction === 'help') {
      renderHelpPage();
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    await loadAppData();
  } catch (err) {
    showError(err);
  }
}

    async function apiGet(params) {
      const url = API_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      return await res.json();
    }

    async function loadAppData() {
      setStatus('กำลังโหลดข้อมูลผู้ใช้งาน...');

      const data = await apiGet({
        action: 'appData',
        lineUserId: lineUserId
      });

      if (!data.ok) {
        document.body.innerHTML = '<div class="card">' + data.message + '</div>';
        return;
      }

      appData = data;

      document.getElementById('recorderName').value = data.user.name || '';

renderBranches();
setDefaultEntryDate();

if (currentAction === 'export') {
  await renderExportPage();
  return;
}

if (currentAction === 'dashboard') {
  await renderDashboardPage();
  return;
}

if (currentAction === 'users') {
  await renderUsersPage();
  return;
}

if (currentAction === 'sales') {
  await renderSalesPage();
  return;
}

if (currentAction === 'stockview') {
  renderStockViewOnly();
  await loadStockMap();
  return;
}

if (currentAction === 'stock') {
  renderTables();
  await loadStockMap();
  return;
}
      
if (currentAction === 'help') {
  renderHelpPage();
  return;
}

      setStatus(
        'ผู้ใช้: ' + data.user.name + '\n' +
        'สิทธิ์: ' + data.user.role
      );
    }

    function renderBranches() {
      const select = document.getElementById('branch');
      select.innerHTML = '';

      appData.branches.forEach(b => {
        const option = document.createElement('option');
        option.value = b.branch_id;
        option.textContent = b.branch_name;
        select.appendChild(option);
      });
    }

    async function loadStockMap() {
      const branchId = getBranchId();
      if (!branchId) return;

      try {
        const data = await apiGet({
          action: 'stockMap',
          branchId: branchId
        });

        if (data.ok) {
          stockMap = data.stockMap || {};
          updateStockDisplays();
        }
      } catch (err) {
        showError(err);
      }
    }

    function renderTables() {
      renderWaterRows();
      renderFruitRows();
      renderDipRows();
    }

    function renderWaterRows() {
      const tbody = document.getElementById('waterRows');
      tbody.innerHTML = '';

      getProductsByCategory('WATER').forEach(p => {
        tbody.appendChild(createRow(p, [
          ['stockIn', 'เติม'],
          ['saleNormal', 'ขาย'],
          ['freeQty', 'แถม'],
          ['damagedQty', 'เสีย'],
          ['tastingQty', 'ชิม']
        ]));
      });
    }

    function renderFruitRows() {
      const tbody = document.getElementById('fruitRows');
      tbody.innerHTML = '';

      getProductsByCategory('FRUIT').forEach(p => {
        tbody.appendChild(createRow(p, [
          ['stockIn', 'เติม'],
          ['saleRF', '99'],
          ['saleRP', '79'],
          ['saleR2', 'คู่'],
          ['damagedQty', 'เสีย']
        ]));
      });
    }

    function renderDipRows() {
      const tbody = document.getElementById('dipRows');
      tbody.innerHTML = '';

      getProductsByCategory('DIP').forEach(p => {
        tbody.appendChild(createRow(p, [
          ['stockIn', 'เติม'],
          ['freeQty', 'แถม']
        ]));
      });
    }

    function createRow(product, fields) {
      const tr = document.createElement('tr');
      tr.dataset.productId = product.product_id;
      tr.dataset.category = product.category;

      const nameTd = document.createElement('td');
      nameTd.className = 'product';
      nameTd.innerHTML =
        product.product_name +
        '<span class="price">' +
        product.product_id +
        ' / ' +
        Number(product.base_price || 0).toLocaleString() +
        ' บาท</span>';
      tr.appendChild(nameTd);

      const stockTd = document.createElement('td');
      stockTd.id = 'stock_' + product.product_id;
      stockTd.textContent = '-';
      tr.appendChild(stockTd);

      fields.forEach(([field]) => {
        const td = document.createElement('td');

        const input = document.createElement('input');
        input.className = 'qty';
        input.type = 'number';
        input.min = '0';
        input.inputMode = 'numeric';
        input.dataset.productId = product.product_id;
        input.dataset.category = product.category;
        input.dataset.field = field;
        input.placeholder = '0';

        td.appendChild(input);
        tr.appendChild(td);
      });

      return tr;
    }

    function updateStockDisplays() {
      Object.keys(stockMap).forEach(productId => {
        const el = document.getElementById('stock_' + productId);
        if (el) el.textContent = Number(stockMap[productId] || 0).toLocaleString();
      });
    }

    function getProductsByCategory(category) {
      return (appData.products || []).filter(p => p.category === category);
    }

    function getBranchId() {
      return document.getElementById('branch').value;
    }

    function collectRows() {
      const map = {};

      document.querySelectorAll('input.qty').forEach(input => {
        const value = Number(input.value || 0);
        if (value <= 0) return;

        const productId = input.dataset.productId;
        const category = input.dataset.category;
        const field = input.dataset.field;

        if (!map[productId]) {
          map[productId] = {
            productId,
            category
          };
        }

        map[productId][field] = value;
      });

      return Object.values(map);
    }


    function clearForm() {
      document.querySelectorAll('input.qty').forEach(input => {
        input.value = '';
      });
      document.getElementById('note').value = '';
      pendingPayload = null;
    }

function setStatus(text) {
  const el = document.getElementById('status');
  if (el) el.textContent = text;
}

    function showError(err) {
      console.error(err);
      alert('เกิดข้อผิดพลาด: ' + (err.message || JSON.stringify(err)));
      setStatus('เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
function hideAllCards() {

  document.querySelectorAll('.card')
    .forEach(el => {
      el.style.display = 'none';
    });

}

function renderStockViewOnly() {

  renderTables();

  document.getElementById('previewBtn')
    .style.display = 'none';

  document.querySelector('.secondary')
    .style.display = 'none';

  document.getElementById('note')
    .style.display = 'none';

  document.querySelectorAll('input.qty')
    .forEach(input => {
      input.disabled = true;
      input.placeholder = '-';
    });

  setStatus(
    'โหมดดูสต๊อก'
  );

}

async function renderSalesPage() {
  hideAllCards();

  document.body.innerHTML = `
    <div class="card">
      <h1>ยอดขายวันนี้</h1>

      <label>สาขา</label>
      <select id="salesBranch"></select>

      <button onclick="loadTodaySales()">ดูยอดขาย</button>

      <div id="salesResult" class="status" style="margin-top:12px;">
        กรุณาเลือกสาขาแล้วกดดูยอดขาย
      </div>
    </div>
  `;

  const select = document.getElementById('salesBranch');
  select.innerHTML = '';

  appData.branches.forEach(b => {
    const option = document.createElement('option');
    option.value = b.branch_id;
    option.textContent = b.branch_name;
    select.appendChild(option);
  });

  await loadTodaySales();
}

async function loadTodaySales() {
  const branchId = document.getElementById('salesBranch').value;
  const resultBox = document.getElementById('salesResult');

  resultBox.textContent = 'กำลังโหลดยอดขาย...';

  try {
    const data = await apiGet({
      action: 'todaySales',
      lineUserId: lineUserId,
      branchId: branchId
    });

    if (!data.ok) {
      resultBox.textContent = data.message || 'ไม่สามารถโหลดข้อมูลได้';
      return;
    }

    let text = '';
    text += 'วันที่: ' + data.date + '\n\n';

    data.rows.forEach(row => {
      text += row.branch_name + ': ';
      text += Number(row.amount || 0).toLocaleString();
      text += ' บาท\n';
    });

    text += '\nรวมทั้งหมด: ';
    text += Number(data.totalAmount || 0).toLocaleString();
    text += ' บาท';

    resultBox.textContent = text;

  } catch (err) {
    resultBox.textContent =
      'เกิดข้อผิดพลาด: ' +
      (err.message || JSON.stringify(err));
  }
}    

function renderHelpPage() {

  hideAllCards();

  document.body.innerHTML = `
    <div class="card">
      <h1>วิธีใช้งาน</h1>

      <div class="summary">
1. เลือกสาขา

2. กรอกจำนวนสินค้า

3. กดตรวจสอบก่อนบันทึก

4. ตรวจสอบยอดขายและสต๊อก

5. กดยืนยันบันทึก
      </div>
    </div>
  `;

}
async function renderDashboardPage() {
  if (!['manager', 'owner'].includes(appData.user.role)) {
    document.body.innerHTML = `
      <div class="card">
        <h1>ไม่มีสิทธิ์</h1>
        <div class="status">หน้านี้สำหรับหัวหน้า/เจ้าของเท่านั้น</div>
      </div>
    `;
    return;
  }

  document.body.innerHTML = `
    <div class="card">
      <h1>Dashboard</h1>
      <div id="dashboardResult">กำลังโหลดข้อมูล...</div>
    </div>
  `;

  const box = document.getElementById('dashboardResult');

  try {
    const data = await apiGet({
      action: 'dashboard',
      lineUserId: lineUserId
    });

    if (!data.ok) {
      box.innerHTML = `<div class="status">${data.message || 'โหลดข้อมูลไม่สำเร็จ'}</div>`;
      return;
    }

    const topBranch = [...data.rows].sort((a, b) => b.today_amount - a.today_amount)[0];
    const lowBranch = [...data.rows].sort((a, b) => a.today_amount - b.today_amount)[0];

    let html = `
      <div class="small">วันที่ ${data.date} | เดือน ${data.month}</div>

      <div class="dashboard-grid">
        <div class="metric-card">
          <div class="metric-title">ยอดขายวันนี้รวม</div>
          <div class="metric-value">${money(data.total_today)} บาท</div>
          <div>${diffHtml(data.total_diff)}</div>
        </div>

        <div class="metric-card">
          <div class="metric-title">ยอดขายสะสมเดือนนี้</div>
          <div class="metric-value">${money(data.total_month_sales)} บาท</div>
          <div class="small">เป้า ${money(data.total_month_target)} บาท</div>
          <div class="small">PO จริง ${money(data.total_po_sales)} บาท</div>
          <div class="small">ส่วนต่างบันทึก/PO ${formatPoDiff(data.total_po_diff)}</div>
          ${progressHtml(data.total_target_percent)}
          <div class="small">PO ทำได้ ${data.total_target_percent || 0}% | เหลือถึงเป้า ${money(data.total_remain_to_target)} บาท</div>
        </div>

        <div class="metric-card">
          <div class="metric-title">สาขายอดขายสูงสุดวันนี้</div>
          <div class="metric-value">${topBranch ? topBranch.branch_name : '-'}</div>
          <div class="small">${topBranch ? money(topBranch.today_amount) : 0} บาท</div>
        </div>

        <div class="metric-card">
          <div class="metric-title">สาขายอดขายต่ำสุดวันนี้</div>
          <div class="metric-value">${lowBranch ? lowBranch.branch_name : '-'}</div>
          <div class="small">${lowBranch ? money(lowBranch.today_amount) : 0} บาท</div>
        </div>
      </div>

<h2 style="margin-top:18px;">สินค้าใกล้หมด</h2>
<div id="lowStockBox" class="status">
กำลังโหลด stock alert...
</div>

<h2 style="margin-top:18px;">แยกตามสาขา</h2>
`;

    data.rows.forEach(row => {
      html += `
        <div class="branch-card">
          <b>${row.branch_name}</b>
          <div>วันนี้: ${money(row.today_amount)} บาท ${diffHtml(row.diff)}</div>
          <div class="small">
            ยอดบันทึกเดือนนี้: ${money(row.month_sales)} / ${money(row.month_target)} บาท
          </div>

          <div class="small">
            PO จริง: ${money(row.po_sales)} บาท
          </div>

          <div class="small">
            ส่วนต่างบันทึก/PO: ${formatPoDiff(row.po_diff)}
          </div>
          ${progressHtml(row.target_percent)}
          <div class="small">
            PO ทำได้ ${row.target_percent || 0}% | เหลือถึงเป้า ${money(row.remain_to_target)} บาท
          </div>
        </div>
      `;
    });

    box.innerHTML = html;
    await loadLowStockBox();

  } catch (err) {
    box.innerHTML = `
      <div class="status">
        เกิดข้อผิดพลาด: ${err.message || JSON.stringify(err)}
      </div>
    `;
  }
}

    function formatDiff(num) {
  const value = Number(num || 0);

  if (value > 0) {
    return '(+' + value.toLocaleString() + ')';
  }

  if (value < 0) {
    return '(-' + Math.abs(value).toLocaleString() + ')';
  }

  return '(+0)';
}

    </div>

async function loadUsersPage() {
  const box = document.getElementById('usersBox');

  try {
    const data = await apiGet({
      action: 'users',
      lineUserId: lineUserId
    });

    if (!data.ok) {
      box.textContent = data.message || 'โหลดรายชื่อไม่สำเร็จ';
      return;
    }

    const pendingUsers = data.users.filter(u => u.status === 'pending');
    const activeUsers = data.users.filter(u => u.status === 'active');
    const inactiveUsers = data.users.filter(u => u.status === 'inactive' || u.status === 'rejected');

    let html = '';

    html += renderUserSection_('รออนุมัติ', pendingUsers, data.branches);
    html += renderUserSection_('ใช้งานอยู่', activeUsers, data.branches);
    html += renderUserSection_('ปิดใช้งาน', inactiveUsers, data.branches);

    box.className = '';
    box.innerHTML = html;

  } catch (err) {
    box.textContent =
      'เกิดข้อผิดพลาด: ' +
      (err.message || JSON.stringify(err));
  }
}

    function renderUserSection_(title, users, branches) {
  let html = `
    <h2 style="margin-top:18px;">${title} (${users.length})</h2>
  `;

  if (!users.length) {
    html += `
      <div class="status">ไม่มีรายการ</div>
    `;
    return html;
  }

  users.forEach(user => {
    html += renderUserCard_(user, branches);
  });

  return html;
}

    function renderUserCard_(user, branches) {
  const safeId = user.line_user_id;

  return `
    <div class="card" style="box-shadow:none;border:1px solid #e5e7eb;">
      <b>${user.name || '-'}</b>
      <div class="small">${user.line_user_id}</div>

      <label>Role</label>
      <select id="role_${safeId}">
        <option value="staff" ${user.role === 'staff' ? 'selected' : ''}>staff</option>
        <option value="manager" ${user.role === 'manager' ? 'selected' : ''}>manager</option>
        <option value="owner" ${user.role === 'owner' ? 'selected' : ''}>owner</option>
      </select>

      <label>สาขา</label>
      <select id="branch_${safeId}">
        <option value="ALL" ${user.branch_id === 'ALL' ? 'selected' : ''}>ALL</option>
        ${branches.map(b => `
          <option value="${b.branch_id}" ${user.branch_id === b.branch_id ? 'selected' : ''}>
            ${b.branch_name}
          </option>
        `).join('')}
      </select>

      <label>Status</label>
      <select id="status_${safeId}">
        <option value="pending" ${user.status === 'pending' ? 'selected' : ''}>pending</option>
        <option value="active" ${user.status === 'active' ? 'selected' : ''}>active</option>
        <option value="inactive" ${user.status === 'inactive' ? 'selected' : ''}>inactive</option>
        <option value="rejected" ${user.status === 'rejected' ? 'selected' : ''}>rejected</option>
      </select>

      <button onclick="saveUser('${safeId}')">
        บันทึกสิทธิ์
      </button>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
        <button onclick="quickSetUser('${safeId}', 'active')">
          อนุมัติ
        </button>

        <button class="danger" onclick="quickSetUser('${safeId}', 'inactive')">
          ระงับ
        </button>
      </div>
    </div>
  `;
}
    
    async function saveUser(targetLineUserId) {
  const payload = {
    actorLineUserId: lineUserId,
    targetLineUserId: targetLineUserId,
    role: document.getElementById('role_' + targetLineUserId).value,
    branchId: document.getElementById('branch_' + targetLineUserId).value,
    status: document.getElementById('status_' + targetLineUserId).value,
  };

  try {
    const data = await apiGet({
      action: 'updateUser',
      payload: JSON.stringify(payload)
    });

    alert(data.message || 'เสร็จสิ้น');

    if (data.ok) {
      await loadUsersPage();
    }

  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + (err.message || JSON.stringify(err)));
  }
}
    function money(value) {
  return Number(value || 0).toLocaleString();
}

function diffHtml(value) {
  const num = Number(value || 0);

  if (num > 0) {
    return `<span class="diff-plus">+${money(num)}</span>`;
  }

  if (num < 0) {
    return `<span class="diff-minus">-${money(Math.abs(num))}</span>`;
  }

  return `<span class="diff-zero">+0</span>`;
}

function progressHtml(percent) {
  const safePercent = Math.max(0, Math.min(Number(percent || 0), 100));

  return `
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${safePercent}%"></div>
    </div>
  `;
}
async function quickSetUser(targetLineUserId, status) {
  document.getElementById('status_' + targetLineUserId).value = status;

  if (status === 'active') {
    const roleEl = document.getElementById('role_' + targetLineUserId);
    const branchEl = document.getElementById('branch_' + targetLineUserId);

    if (!roleEl.value) roleEl.value = 'staff';
    if (!branchEl.value) branchEl.value = 'LP';
  }

  await saveUser(targetLineUserId);
}
    
    
    async function loadLowStockBox() {
  const box = document.getElementById('lowStockBox');
  if (!box) return;

  try {
    const data = await apiGet({
      action: 'lowStock',
      lineUserId: lineUserId
    });

    if (!data.ok) {
      box.textContent = data.message || 'โหลด stock alert ไม่สำเร็จ';
      return;
    }

    if (!data.rows.length) {
      box.textContent = 'ไม่มีสินค้าใกล้หมด';
      return;
    }

    let text = '';
    text += 'แจ้งเตือนสินค้าเหลือน้อยกว่า/เท่ากับ ';
    text += data.threshold;
    text += '\n\n';

    data.rows.forEach(item => {
      text += item.branch_name;
      text += ' - ';
      text += item.product_name;
      text += ': ';
      text += item.stock;
      text += '\n';
    });

    box.textContent = text;

  } catch (err) {
    box.textContent =
      'เกิดข้อผิดพลาด: ' +
      (err.message || JSON.stringify(err));
  }
}

async function exportSalesReport() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const resultBox = document.getElementById('exportResult');

  if (!startDate || !endDate) {
    resultBox.textContent = 'กรุณาเลือกวันที่';
    return;
  }

  resultBox.textContent = 'กำลังสร้างรายงาน...';

  try {
    const data = await apiGet({
      action: 'exportSales',
      lineUserId: lineUserId,
      startDate: startDate,
      endDate: endDate
    });

    console.log('EXPORT RESULT', data);

    if (!data.ok) {
      resultBox.textContent = data.message || 'สร้างรายงานไม่สำเร็จ';
      return;
    }

    const count = data.count || 0;
    const fileUrl = data.xlsxUrl || data.url || data.fileUrl || '';

    if (!fileUrl) {
      resultBox.textContent =
        'สร้างรายงานแล้ว แต่ไม่พบ URL ไฟล์\n\n' +
        JSON.stringify(data, null, 2);
      return;
    }

    resultBox.innerHTML = `
      <div>สร้างรายงานเรียบร้อย</div>
      <div>จำนวนรายการ: ${count}</div>
      <br>
      <a href="${fileUrl}" target="_blank" rel="noopener">
        เปิดไฟล์รายงาน
      </a>
    `;

  } catch (err) {
    resultBox.textContent =
      'เกิดข้อผิดพลาด: ' +
      (err.message || JSON.stringify(err));
  }
}

async function openPreview() {

  const rows = collectRows();

  if (!getBranchId()) {
    alert('กรุณาเลือกสาขา');
    return;
  }

  const entryDate =
    document.getElementById('entryDate').value;

  if (!entryDate) {
    alert('กรุณาเลือกวันที่');
    return;
  }

  if (!rows.length) {
    alert('กรุณากรอกอย่างน้อย 1 รายการ');
    return;
  }

  pendingPayload = {
    lineUserId,
    branchId: getBranchId(),
    entryDate,
    rows,
    note:
      document.getElementById('note').value || ''
  };

  try {

    const btn =
      document.getElementById('previewBtn');

    btn.disabled = true;
    btn.textContent = 'กำลังตรวจสอบ...';

    const data = await apiGet({
      action: 'previewBulkV2',
      payload: JSON.stringify(pendingPayload)
    });

    btn.disabled = false;
    btn.textContent = 'ตรวจสอบก่อนบันทึก';

    if (!data.ok) {
      alert(data.message || 'ตรวจสอบไม่สำเร็จ');
      return;
    }

    renderPreviewModal(data);

    document.getElementById(
      'modalBackdrop'
    ).style.display = 'flex';

  } catch (err) {

    const btn =
      document.getElementById('previewBtn');

    btn.disabled = false;
    btn.textContent = 'ตรวจสอบก่อนบันทึก';

    showError(err);
  }
}
