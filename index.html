function detectCurrentAction() {
  const searchParams =
    new URLSearchParams(window.location.search);

  let mode =
    searchParams.get('mode') ||
    searchParams.get('action') ||
    '';

  if (!mode && window.location.hash) {
    mode =
      window.location.hash.replace('#', '');
  }

  if (!mode) {
    try {
      const context =
        liff.getContext();

      const state =
        context &&
        context.liff &&
        context.liff.state
          ? decodeURIComponent(context.liff.state)
          : '';

      if (state) {
        const cleanState =
          state.replace(/^\?/, '');

        const stateParams =
          new URLSearchParams(cleanState);

        mode =
          stateParams.get('mode') ||
          stateParams.get('action') ||
          '';
      }

    } catch (err) {}
  }

  currentAction =
    mode || 'stock';

  console.log('currentAction =', currentAction);
}
    
    
async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    detectCurrentAction();

    if (currentAction === 'help') {
      renderHelpPage();
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    await loadAppData();
  } catch (err) {
    showError(err);
  }
}

        return;

      appData = data;

      document.getElementById('recorderName').value = data.user.name || '';

renderBranches();

if (currentAction === 'stock') {

      setStatus(

    function renderBranches() {
      const select = document.getElementById('branch');

    async function loadStockMap() {
      const branchId = getBranchId();
      if (!branchId) return;

      try {
        const data = await apiGet({
          action: 'stockMap',
          branchId: branchId
        });

      if (data.ok) {
        stockMap = data.stockMap || {};

        updateStockDisplays();

        renderWaterRows();
        renderFruitRows();
        renderDipRows();

      } catch (err) {

function getStockQty(productId) {
  const item = stockMap[productId];

  if (item === undefined || item === null) {
    return 0;
  }

  if (typeof item === 'number') {
    return item;
  }

  if (typeof item === 'string') {
    return Number(item || 0);
  }

  return Number(
    item.stock ??
    item.qty ??
    item.balance ??
    item.current_qty ??
    item.current_stock ??
    item.stock_qty ??
    item.qty_balance ??
    0
  );
}

    function createRow(product, fields) {
      const tr = document.createElement('tr');
      tr.dataset.productId = product.product_id;
      tr.dataset.category = product.category;

      const nameTd = document.createElement('td');
      nameTd.className = 'product';
      nameTd.innerHTML =
        product.product_name +
        '<span class="price">' +
        product.product_id +
        ' / ' +
        Number(product.base_price || 0).toLocaleString() +
        ' บาท</span>';
      tr.appendChild(nameTd);

      const stockTd = document.createElement('td');
      stockTd.id = 'stock_' + product.product_id;
      stockTd.textContent = '-';
      tr.appendChild(stockTd);

      fields.forEach(([field]) => {
        const td = document.createElement('td');

        const input = document.createElement('input');
        input.className = 'qty';
        input.type = 'number';
        input.min = '0';
        input.inputMode = 'numeric';
        input.dataset.productId = product.product_id;
        input.dataset.category = product.category;
        input.dataset.field = field;
        input.placeholder = '0';

        td.appendChild(input);
        tr.appendChild(td);
      });

      return tr;
    }

    function updateStockDisplays() {
        Object.keys(stockMap).forEach(productId => {
          const el = document.getElementById('stock_' + productId);
          if (el) {
              el.textContent =
              getStockQty(productId).toLocaleString();
          }
        });
      }

    function getProductsByCategory(category) {
      return (appData.products || []).filter(p => p.category === category);
    }

    function getBranchId() {
      return document.getElementById('branch').value;
    }

    function collectRows() {
  const map = {};

  document.querySelectorAll('input.qty').forEach(input => {
    const value = Number(input.value || 0);
    if (value <= 0) return;

    const productId =
      input.dataset.productId ||
      input.dataset.product;

    const category =
      input.dataset.category || '';

    const field =
      input.dataset.field;

    if (!productId || !field) return;

    if (!map[productId]) {
      map[productId] = {
        productId,
        category
      };
    }

    map[productId][field] = value;
  });

  return Object.values(map);
}

async function loadTodaySales() {
  const branchId = document.getElementById('salesBranch').value;
  const resultBox = document.getElementById('salesResult');

  resultBox.textContent = 'กำลังโหลดยอดขาย...';

  try {
    const data = await apiGet({
      action: 'todaySales',
      lineUserId: lineUserId,

    function formatShortDate(dateText) {
  const text =
    String(dateText || '').trim();

  if (!text) {
    return '-';
  }

  const parts =
    text.split('-');

  if (parts.length !== 3) {
    return text;
  }

  return parts[2] + '/' + parts[1];
}

    function formatDiff(num) {
  const value = Number(num || 0);

  if (value > 0) {
    return '(+' + value.toLocaleString() + ')';
  }

  if (value < 0) {
    return '(-' + Math.abs(value).toLocaleString() + ')';
  }

  return '(+0)';
}

function formatPoDiff(value) {
  const num = Number(value || 0);

  if (num > 0) {
    return '+' + money(num) + ' บาท';
  }

  if (num < 0) {
    return '-' + money(Math.abs(num)) + ' บาท';
  }

  return '0 บาท';
}

async function submitConfirmed() {

  if (isSubmitting) {
    return;
  }

  if (!pendingPayload) {
    alert('ไม่มีข้อมูลสำหรับบันทึก');
    return;
  }

  const btn =
    document.getElementById('confirmBtn');

  try {

    isSubmitting = true;

    if (btn) {
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
    }

    const data = await apiGet({
      action: 'submitBulkV2',
      payload: JSON.stringify(pendingPayload)
    });

    if (!data.ok) {
      alert(data.message || 'บันทึกไม่สำเร็จ');

    closePreview();

      'ยอดขายรวม: ' +
      Number(data.totalAmount || 0).toLocaleString() +

  } finally {

async function submitRestockFromLiff() {
  const branchId =
    document.getElementById('branchId').value;

  const staffName =
    document.getElementById('staffName').value.trim();

  const requestedDeliveryDate =
    document.getElementById('requestedDeliveryDate').value;

  const submitBtn =
    document.getElementById('submitBtn');

  if (!branchId) {
    alert('กรุณาเลือกสาขา');
    return;
  }

  if (!staffName) {
    alert('กรุณาเลือกชื่อผู้สั่ง');
    return;
  }

  if (!requestedDeliveryDate) {
    alert('กรุณาเลือกวันที่ต้องการรับสินค้า');
    return;
  }

  const items = [];

  restockItems.forEach(function(item, index) {
    const qty =
      Number(document.getElementById('qty_' + index).value || 0);

    if (qty > 0) {
      items.push({
        product_id: item.product_id,
        product_name: item.product_name || item.product_id,
        current_stock: item.current_stock,
        min_qty: item.min_qty || '',
        requested_qty: qty,
        remark: document.getElementById('remark_' + index).value.trim()
      });
    }
  });

  if (!items.length) {
    alert('กรุณากรอกจำนวนเติมอย่างน้อย 1 รายการ');
    return;
  }

  const confirmText =
    items.map(function(item) {
      return item.product_id + ' เติม ' + item.requested_qty;
    }).join('\\n');

  if (!confirm('ยืนยันส่งคำขอเติม?\\n\\n' + confirmText)) {
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'กำลังส่ง...';

  try {
    const data = await apiGet({
      action: 'submitRestock',
      payload: JSON.stringify({
        branch_id: branchId,
        staff_name: staffName,
        requested_delivery_date: requestedDeliveryDate,
        items: items
      })
    });

    if (!data.ok) {
      alert(data.message || 'ส่งคำขอเติมไม่สำเร็จ');
      submitBtn.disabled = false;
      submitBtn.textContent = 'ส่งคำขอเติม';
      return;
    }

    alert('ส่งคำขอเติมสำเร็จ');
    submitBtn.textContent = 'ส่งคำขอเติม';
    await loadRestockData();

  } catch (err) {
    alert('ส่งไม่สำเร็จ: ' + (err.message || err));
    submitBtn.disabled = false;
    submitBtn.textContent = 'ส่งคำขอเติม';
  }
}

          onclick="confirmRestockAdminGroup(${groupIndex})">
          อนุมัติทั้งใบนี้
        </button>
      `;
    }

    if (groupStatus === 'APPROVED') {
      html += `
        <button
          id="admin_receive_btn_${groupIndex}"
          onclick="receiveRestockAdminGroup(${groupIndex})"
          style="background:#16a34a;">
          รับสินค้าแล้ว
        </button>
      `;
    }

    html += `
      </div>
    `;
  });

  box.className = '';
  box.innerHTML = html;
}

async function confirmRestockAdminGroup(groupIndex) {
  const group =
    pendingRestockGroups[groupIndex];

  const btn =
    document.getElementById('admin_btn_' + groupIndex);

  const confirmedBy =
    document.getElementById('confirmedBy').value.trim();

  const deliveryDate =
    document.getElementById('admin_delivery_date_' + groupIndex).value;

  if (!group || !group.request_id) {
    alert('ไม่พบเลขที่ใบสั่ง');
    return;
  }

  if (!confirmedBy) {
    alert('กรุณาระบุผู้ยืนยัน');
    return;
  }

  if (!deliveryDate) {
    alert('กรุณาระบุวันส่งจริง');
    return;
  }

  const items =
    (group.items || []).map(function(item, itemIndex) {
      const el =
        document.getElementById(
          'admin_confirmed_qty_' + groupIndex + '_' + itemIndex
        );

      return {
        row_number: item.row_number,
        product_code: item.product_code,
        product_name: item.product_name,
        confirmed_qty: Number(el.value || 0),
        remark: item.remark || ''
      };
    });

  if (!items.some(item => Number(item.confirmed_qty || 0) > 0)) {
    alert('กรุณาระบุจำนวนที่ยืนยันอย่างน้อย 1 รายการ');
    return;
  }

  if (!confirm('ยืนยันอนุมัติใบเติมสินค้า?\n\nเลขที่ ' + group.request_id)) {
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังอนุมัติ...';

  try {
    const data =
      await apiGet({
        action: 'confirmRestockGroup',
        payload: JSON.stringify({
          request_id: group.request_id,
          delivery_date: deliveryDate,
          confirmed_by: confirmedBy,
          items: items
        })
      });

    if (!data.ok) {
      alert(data.message || 'อนุมัติไม่สำเร็จ');
      btn.disabled = false;
      btn.textContent = 'อนุมัติทั้งใบนี้';
      return;
    }

    alert('อนุมัติเรียบร้อย\n\nเลขที่ ' + data.request_id);

    await loadRestockAdminGroups();

  } catch (err) {
    alert('อนุมัติไม่สำเร็จ: ' + (err.message || err));
    btn.disabled = false;
    btn.textContent = 'อนุมัติทั้งใบนี้';
  }
}

async function receiveRestockAdminGroup(groupIndex) {
  const group =
    pendingRestockGroups[groupIndex];

  const btn =
    document.getElementById('admin_receive_btn_' + groupIndex);

  if (!group || !group.request_id) {
    alert('ไม่พบเลขที่ใบสั่ง');
    return;
  }

  if (!confirm('ยืนยันรับสินค้าเข้าสต๊อก?\n\nเลขที่ ' + group.request_id)) {
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังรับสินค้า...';

  try {
    const data =
      await apiGet({
        action: 'receiveRestockGroup',
        requestId: group.request_id
      });

    if (!data.ok) {
      alert(data.message || 'รับสินค้าไม่สำเร็จ');
      btn.disabled = false;
      btn.textContent = 'รับสินค้าแล้ว';
      return;
    }

    alert(
      'รับสินค้าเรียบร้อย\n\n' +
      'จำนวนรายการ: ' + (data.received_count || 0) + '\n' +
      'จำนวนรวม: ' + (data.received_qty || 0)
    );

    await loadRestockAdminGroups();

  } catch (err) {
    alert('รับสินค้าไม่สำเร็จ: ' + (err.message || err));
    btn.disabled = false;
    btn.textContent = 'รับสินค้าแล้ว';
  }
}

async function renderVoidLogsPage() {
  if (!['manager', 'owner'].includes(appData.user.role)) {
    document.body.innerHTML = `
      <div class="card">
        <h1>ไม่มีสิทธิ์</h1>
        <div class="status">หน้านี้สำหรับหัวหน้า/เจ้าของเท่านั้น</div>
      </div>
    `;
    return;
  }

  document.body.innerHTML = `
    <div class="card">
      <h1>Void รายการผิด</h1>

      <label>ค้นหาจากสาขา</label>
      <select id="voidSearchBranch">
        <option value="">เลือกสาขา</option>
      </select>

      <label>วันที่</label>
      <input id="voidSearchDate" type="date">

      <button onclick="searchVoidByBranchDate()">
        ค้นหาจากสาขา/วันที่
      </button>

      <hr style="border:none;border-top:1px solid #eee;margin:14px 0;">

      <label>หรือค้นหาด้วย tx_id</label>
      <textarea
        id="voidTxIds"
        rows="4"
        placeholder="ใส่ tx_id ทีละบรรทัด หรือคั่นด้วย comma"></textarea>

      <button onclick="searchVoidByTxIds()">
        ค้นหาจาก tx_id
      </button>
    </div>

    <div class="card">
      <label>เหตุผลการ Void</label>
      <input
        id="voidReason"
        type="text"
        placeholder="เช่น พนักงานคีย์ผิด">

      <button
        class="danger"
        id="voidSubmitBtn"
        onclick="voidSelectedLogs()"
        disabled>
        ยืนยัน Void รายการที่ค้นพบ
      </button>
    </div>

    <div id="voidResultArea" class="card">
      <div class="small">ยังไม่มีรายการ</div>
    </div>
  `;

  const branchSelect =
    document.getElementById('voidSearchBranch');

  (appData.branches || []).forEach(function(branch) {
    const option =
      document.createElement('option');

    option.value =
      branch.branch_id;

    option.textContent =
      branch.branch_name;

    branchSelect.appendChild(option);
  });

  const today =
    new Date();

  const yyyy =
    today.getFullYear();

  const mm =
    String(today.getMonth() + 1).padStart(2, '0');

  const dd =
    String(today.getDate()).padStart(2, '0');

  document.getElementById('voidSearchDate').value =
    `${yyyy}-${mm}-${dd}`;
}

async function searchVoidByBranchDate() {
  const branchId =
    document.getElementById('voidSearchBranch').value;

  const dateText =
    document.getElementById('voidSearchDate').value;

  const resultArea =
    document.getElementById('voidResultArea');

  const voidBtn =
    document.getElementById('voidSubmitBtn');

  foundVoidLogs = [];
  voidBtn.disabled = true;

  if (!branchId) {
    alert('กรุณาเลือกสาขา');
    return;
  }

  if (!dateText) {
    alert('กรุณาเลือกวันที่');
    return;
  }

  resultArea.innerHTML =
    '<div class="small">กำลังค้นหา...</div>';

  try {
    const data =
      await apiGet({
        action: 'stockLogsByBranchDate',
        branchId: branchId,
        dateText: dateText
      });

    if (!data.ok) {
      resultArea.innerHTML =
        data.message || 'ค้นหาไม่สำเร็จ';
      return;
    }

    foundVoidLogs =
      data.logs || [];

    renderVoidLogs();

  } catch (err) {
    resultArea.innerHTML =
      'ค้นหาไม่สำเร็จ: ' +
      (err.message || JSON.stringify(err));
  }
}

async function searchVoidByTxIds() {
  const txText =
    document.getElementById('voidTxIds').value.trim();

  const resultArea =
    document.getElementById('voidResultArea');

  const voidBtn =
    document.getElementById('voidSubmitBtn');

  foundVoidLogs = [];
  voidBtn.disabled = true;

  if (!txText) {
    alert('กรุณาใส่ tx_id');
    return;
  }

  resultArea.innerHTML =
    '<div class="small">กำลังค้นหา...</div>';

  try {
    const data =
      await apiGet({
        action: 'stockLogsByTxIds',
        txIds: txText
      });

    if (!data.ok) {
      resultArea.innerHTML =
        data.message || 'ค้นหาไม่สำเร็จ';
      return;
    }

    foundVoidLogs =
      data.logs || [];

    renderVoidLogs();

  } catch (err) {
    resultArea.innerHTML =
      'ค้นหาไม่สำเร็จ: ' +
      (err.message || JSON.stringify(err));
  }
}

function renderVoidLogs() {
  const resultArea =
    document.getElementById('voidResultArea');

  const voidBtn =
    document.getElementById('voidSubmitBtn');

  if (!foundVoidLogs.length) {
    resultArea.innerHTML =
      '<div class="small">ไม่พบรายการ</div>';

    voidBtn.disabled = true;
    return;
  }

  let totalIn = 0;
  let totalOut = 0;
  let hasActive = false;

  foundVoidLogs.forEach(function(row) {
    totalIn += Number(row.qty_in || 0);
    totalOut += Number(row.qty_out || 0);

    if (String(row.void_status || '').trim().toUpperCase() !== 'VOID') {
      hasActive = true;
    }
  });

  let html = `
    <div class="status">
พบ ${foundVoidLogs.length} รายการ
qty_in รวม: ${totalIn}
qty_out รวม: ${totalOut}
    </div>

    <div class="table-wrap" style="margin-top:12px;">
      <table>
        <thead>
          <tr>
            <th>เลือก</th>
            <th>tx_id</th>
            <th>วันที่</th>
            <th>สาขา</th>
            <th>สินค้า</th>
            <th>ประเภท</th>
            <th>เข้า</th>
            <th>ออก</th>
            <th>ยอดเงิน</th>
            <th>void</th>
          </tr>
        </thead>
        <tbody>
  `;

  foundVoidLogs.forEach(function(row) {
    const isVoided =
      String(row.void_status || '').trim().toUpperCase() === 'VOID';

    html += `
      <tr style="${isVoided ? 'background:#f3f4f6;color:#999;' : ''}">
        <td>
          <input
            type="checkbox"
            class="void-check"
            data-tx-id="${row.tx_id}"
            ${isVoided ? 'disabled' : 'checked'}>
        </td>
        <td>${row.tx_id || '-'}</td>
        <td>${row.datetime || '-'}</td>
        <td>${row.branch_id || '-'}</td>
        <td>${row.product_id || '-'}</td>
        <td>${row.movement_type || '-'}</td>
        <td>${row.qty_in || 0}</td>
        <td>${row.qty_out || 0}</td>
        <td>${Number(row.amount || 0).toLocaleString()}</td>
        <td>${row.void_status || '-'}</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  resultArea.innerHTML = html;
  voidBtn.disabled = !hasActive;
}

async function voidSelectedLogs() {
  const reason =
    document.getElementById('voidReason').value.trim();

  const voidBtn =
    document.getElementById('voidSubmitBtn');

  if (!foundVoidLogs.length) {
    alert('ยังไม่มีรายการให้ void');
    return;
  }

  if (!reason) {
    alert('กรุณาระบุเหตุผล');
    return;
  }

  const activeTxIds =
    Array.from(
      document.querySelectorAll('.void-check:checked')
    ).map(input => input.dataset.txId);

  if (!activeTxIds.length) {
    alert('กรุณาเลือกรายการที่ต้องการ Void');
    return;
  }

  if (
    !confirm(
      'ยืนยัน Void ' +
      activeTxIds.length +
      ' รายการ?\n\nระบบจะปรับ STOCK_BALANCE กลับอัตโนมัติ'
    )
  ) {
    return;
  }

  voidBtn.disabled = true;
  voidBtn.textContent = 'กำลัง Void...';

  try {
    const data =
      await apiGet({
        action: 'voidStockLogs',
        payload: JSON.stringify({
          tx_ids: activeTxIds,
          reason: reason
        })
      });

    if (!data.ok) {
      alert(data.message || 'Void ไม่สำเร็จ');
      voidBtn.disabled = false;
      voidBtn.textContent = 'ยืนยัน Void รายการที่ค้นพบ';
      return;
    }

    alert(
      'Void สำเร็จ\n\n' +
      'จำนวนรายการ: ' + data.void_count + '\n' +
      'ผลกระทบ stock:\n' +
      JSON.stringify(data.affected, null, 2)
    );

    voidBtn.textContent =
      'ยืนยัน Void รายการที่ค้นพบ';

    if (document.getElementById('voidSearchBranch').value) {
      await searchVoidByBranchDate();
    } else {
      await searchVoidByTxIds();
    }

  } catch (err) {
    alert('Void ไม่สำเร็จ: ' + (err.message || err));
    voidBtn.disabled = false;
    voidBtn.textContent = 'ยืนยัน Void รายการที่ค้นพบ';
  }
}
    
    main();
  </script>
</body>
</html>
